<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnott Kenpo Karate</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
        }

        header{
            background-color: black;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid red;
        }

        header h1{
            margin: 0;
            font-size: 48px;
            color: red;
        }

        header p{
            color: lightgray;
            font-size: 18px;
        }

        nav{
            background-color: #2e2e2e;
            padding: 15px;
            text-align: center;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover{
            color: red;
        }

        .hero{
            text-align: center;
            padding: 80px 20px;
            background-color: #3a3a3a;
        }

        .hero h2{
            font-size: 42px;
            color: red;
        }

        .hero p{
            font-size: 20px;
            max-width: 700px;
            margin: auto;
            color: lightgray;
        }

        .button{
            display: inline-block;
            margin-top: 30px;
            padding: 14px 28px;
            background-color: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .button:hover{
            background-color: darkred;
        }

        .section{
            padding: 50px 20px;
            text-align: center;
        }

        .section h3{
            color: red;
            font-size: 32px;
        }

        .section p{
            color: lightgray;
            max-width: 800px;
            margin: auto;
            line-height: 1.6;
        }

        footer{
            background-color: black;
            color: gray;
            text-align: center;
            padding: 20px;
            border-top: 4px solid red;
        }
    </style>
</head>
<body>
